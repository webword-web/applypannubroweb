<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | APPLY PANNU BRO</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    /* Admin specific styles */
    .admin-container {
      display: none;
      /* Hidden until logged in */
      padding: 100px 20px 50px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface-color);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .admin-table th,
    .admin-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .admin-table th {
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary-color);
    }

    .action-btn {
      padding: 5px 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      color: #fff;
      margin-right: 5px;
    }

    .btn-edit {
      background: #3b82f6;
    }

    .btn-toggle {
      background: #64748b;
    }

    .btn-delete {
      background: #ef4444;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal-box {
      background: var(--surface-color);
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-primary);
    }
  </style>
</head>

<body>

  <!-- Login Modal -->
  <div id="login-modal" class="modal-overlay">
    <div class="modal-box" style="max-width: 400px; text-align: center;">
      <h2 style="margin-bottom: 20px; color: var(--primary-color);">Admin Login</h2>
      <div class="form-group" style="text-align: left;">
        <label>Username</label>
        <input type="text" id="admin-user" placeholder="Enter 'admin'">
      </div>
      <div class="form-group" style="text-align: left;">
        <label>Password</label>
        <input type="password" id="admin-pass" placeholder="Enter 'dhanushB@8525'">
      </div>
      <p id="login-err" style="color: red; margin-bottom: 15px; display: none;">Invalid Credentials!</p>
      <button id="login-btn" class="btn btn-primary" style="width: 100%;">Login to Dashboard</button>
      <a href="index.html"
        style="display: block; margin-top: 15px; color: var(--text-secondary); text-decoration: underline;">Return to
        Website</a>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="admin-dashboard" class="admin-container">
    <div class="admin-header">
      <h2><i class="fa-solid fa-gear"></i> Service Management</h2>
      <div>
        <button id="add-new-btn" class="btn btn-secondary"><i class="fa-solid fa-plus"></i> Add New Service</button>
        <button id="logout-btn" class="btn btn-outline" style="margin-left: 10px;">Logout</button>
      </div>
    </div>

    <div style="margin-bottom: 20px;">
      <input type="text" id="admin-search" placeholder="Search services..."
        style="padding: 10px; width: 100%; max-width: 400px; border-radius: 5px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-primary);">
    </div>

    <div style="overflow-x: auto;">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Icon</th>
            <th>Service Name</th>
            <th>Category</th>
            <th>Status</th>
            <th>Visibility</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="admin-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="service-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 id="modal-title" style="margin-bottom: 20px;">Add New Service</h2>

      <input type="hidden" id="form-id">

      <div class="form-group">
        <label>Service Name</label>
        <input type="text" id="form-title" required>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>Category</label>
          <select id="form-category">
            <option value="Government">Government</option>
            <option value="Education">Education</option>
            <option value="Business">Business</option>
            <option value="Payment">Payment</option>
            <option value="Booking">Booking</option>
            <option value="Travel">Travel</option>
            <option value="Recharge">Recharge</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price</label>
          <input type="text" id="form-price" placeholder="e.g. ₹200 or Custom">
        </div>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="form-status">
          <option value="Available">Available</option>
          <option value="Coming Soon">Coming Soon</option>
          <option value="Not Available">Not Available</option>
        </select>
      </div>

      <div class="form-group">
        <label>Icon Class (FontAwesome)</label>
        <input type="text" id="form-icon" placeholder="e.g. fa-solid fa-file">
      </div>

      <div class="form-group">
        <label>Tamil Description</label>
        <textarea id="form-desc" rows="3"></textarea>
      </div>

      <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
        <button id="modal-cancel" class="btn btn-outline">Cancel</button>
        <button id="modal-save" class="btn btn-primary">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
